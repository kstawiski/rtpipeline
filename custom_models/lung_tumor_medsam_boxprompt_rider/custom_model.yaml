name: lung_tumor_medsam_boxprompt_rider
description: >
  RIDER scan-rescan variant of the MedSAM ViT-B foundation comparator. RIDER
  lacks specialist GTV contours; this variant uses the TS lung_nodules output
  as the exploratory anchor reference (and as the bbox-prompt source via the
  shared anchor diagnostics), with the Dice gate disabled. It is intended only
  for TS lung_nodules-anchored test-retest reproducibility evaluation.
required_body_regions:
  - THORAX
min_region_confidence: 0.5
nnunet:
  interface: medsam_boxprompt
  command: MedSAM
  model: vit_b
  folds: all
  networks:
    - id: medsam_vit_b
      alias: medsam_boxprompt_rider
      architecture: vit_b
      source_directory: weights/MedSAM
      dataset_directory: weights/MedSAM
      checkpoint: weights/medsam_vit_b.pth
      prompt:
        prompt_source: anchor_bbox
        bbox_margin_voxels: 3
      postprocessing:
        anchor_source: specialist_reference
        anchor_glob: Segmentation_CustomModels/lung_tumor_totalseg_lung_nodules_rider/lung_nodules.nii.gz
        dice_reference_glob: ""
        anchor_max_distance_cm: 5.0
        confine_to_lung_mask: false
        min_component_volume_cm3: 0.5
      label_order:
        - lung_tumor
  combine:
    ordered_networks: ["medsam_boxprompt_rider"]

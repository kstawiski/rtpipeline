enabled: false
name: lung_tumor_pancancer_lung_rider
description: >
  Deferred RIDER variant of the PanCancerSeg lung comparator. Enable only after
  the clinician bbox anchor manifest is staged.
required_body_regions:
  - THORAX
min_region_confidence: 0.5
nnunet:
  interface: nnunetv2_modelfolder
  command: nnUNetv2_predict_from_modelfolder
  model: 3d_fullres
  folds: [0]
  env:
    nnUNet_results: ../lung_tumor_pancancer_lung/weights/PanCancerSeg-Specialized-weights
    nnUNet_raw: ./nnUNet_raw
    nnUNet_preprocessed: ./nnUNet_preprocessed
  networks:
    - id: Dataset105_Lung
      alias: pancancer_lung
      source_directory: ../lung_tumor_pancancer_lung/weights/PanCancerSeg-Specialized-weights/Dataset105_Lung/nnUNetTrainerWandb2000__nnUNetResEncUNetMPlans__3d_fullres
      dataset_directory: Dataset105_Lung/nnUNetTrainerWandb2000__nnUNetResEncUNetMPlans__3d_fullres
      trainer: nnUNetTrainerWandb2000
      folds: [0]
      predict_args:
        - -chk
        - checkpoint_best.pth
        - --disable_tta
        - -device
        - cuda
      postprocessing:
        anchor_source: rider_clinician_bbox
        anchor_manifest_path: Segmentation_RIDER_anchor/_clinician_bbox_manifest.json
        anchor_max_distance_cm: 5.0
        confine_to_lung_mask: true
        min_component_volume_cm3: 0.5
      label_order:
        - lung_tumor
  combine:
    ordered_networks: ["pancancer_lung"]

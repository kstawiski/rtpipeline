name: lung_tumor_pancancer_lung_rider
description: >
  RIDER scan-rescan variant of the PanCancerSeg lung comparator. RIDER lacks
  specialist GTV contours; this variant uses the TS lung_nodules output as the
  exploratory anchor reference, with the Dice gate disabled. Reported as
  "TS lung_nodules-anchored test-retest reproducibility" in the manuscript.
required_body_regions:
  - THORAX
min_region_confidence: 0.5
nnunet:
  interface: nnunetv2_modelfolder
  command: nnUNetv2_predict_from_modelfolder
  model: 3d_fullres
  folds: [0]
  env:
    nnUNet_results: ./weights/PanCancerSeg-Specialized-weights
    nnUNet_raw: ./nnUNet_raw
    nnUNet_preprocessed: ./nnUNet_preprocessed
  networks:
    - id: Dataset105_Lung
      alias: pancancer_lung_rider
      source_directory: weights/PanCancerSeg-Specialized-weights/Dataset105_Lung/nnUNetTrainerWandb2000__nnUNetResEncUNetMPlans__3d_fullres
      dataset_directory: Dataset105_Lung/nnUNetTrainerWandb2000__nnUNetResEncUNetMPlans__3d_fullres
      trainer: nnUNetTrainerWandb2000
      folds: [0]
      predict_args:
        - -chk
        - checkpoint_best.pth
        - --disable_tta
        - -device
        - cuda
      postprocessing:
        anchor_source: specialist_reference
        anchor_glob: Segmentation_CustomModels/lung_tumor_totalseg_lung_nodules_rider/lung_nodules.nii.gz
        dice_reference_glob: ""
        anchor_max_distance_cm: 5.0
        confine_to_lung_mask: false
        min_component_volume_cm3: 0.5
      label_order:
        - lung_tumor
  combine:
    ordered_networks: ["pancancer_lung_rider"]

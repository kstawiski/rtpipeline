name: lung_tumor_medsam_boxprompt
description: >
  MedSAM ViT-B foundation segmentation model prompted deterministically from the
  lesion anchor bbox. Lung confinement disabled because the anchor itself is the
  localization lock; specialist GTVs of peritumoral/pleural-invasion tumors fall
  outside the TS bilateral lung mask, so lung intersection wipes valid masks
  (verified on interobs06/15/21 sentinel re-runs 2026-05-02).
required_body_regions:
  - THORAX
min_region_confidence: 0.5
nnunet:
  interface: medsam_boxprompt
  command: MedSAM
  model: vit_b
  folds: all
  networks:
    - id: medsam_vit_b
      alias: medsam_boxprompt
      architecture: vit_b
      source_directory: weights/MedSAM
      dataset_directory: weights/MedSAM
      checkpoint: weights/medsam_vit_b.pth
      prompt:
        prompt_source: anchor_bbox
        bbox_margin_voxels: 3
      postprocessing:
        anchor_source: specialist_reference
        anchor_max_distance_cm: 5.0
        anchor_glob: Segmentation_Original/CT_*/GTV-1*-*.nii.gz
        dice_reference_glob: Segmentation_Original/CT_*/GTV-1vis-*.nii.gz
        confine_to_lung_mask: false
        min_component_volume_cm3: 0.5
      label_order:
        - lung_tumor
  combine:
    ordered_networks: ["medsam_boxprompt"]

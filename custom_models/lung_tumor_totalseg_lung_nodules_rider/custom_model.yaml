name: lung_tumor_totalseg_lung_nodules_rider
description: >
  RIDER scan-rescan variant of the TotalSegmentator lung_nodules comparator.
  No anchor postprocessing because RIDER lacks specialist GTV contours; the
  raw TS lung_nodules mask is preserved as the localisation reference for
  PanCancer-RIDER and MedSAM-RIDER and as the test-retest comparator itself.
required_body_regions:
  - THORAX
min_region_confidence: 0.5
nnunet:
  interface: totalsegmentator
  command: TotalSegmentator
  model: 3d_fullres
  folds: all
  env:
    TOTALSEG_HOME_DIR: ./.totalsegmentator
  networks:
    - id: lung_nodules
      alias: lung_nodules_rider
      task: lung_nodules
      source_directory: .totalsegmentator/nnunet/results
      dataset_directory: .totalsegmentator/nnunet/results
      label_order:
        - lung_nodules
  combine:
    ordered_networks: ["lung_nodules_rider"]

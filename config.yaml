# RTpipeline manuscript config: Pluca RCHT (Cohort 4 — Thorax)
# n=58 lung chemoradiotherapy, single institution (Kopernik Lodz)
# Scanners: Sensation Open (46), SOMATOM go.Sim (9), Biograph128 (3); 120kVp
# Protocol version: 1.0 (locked 2026-03-03, PLAN.md v1.2.1)

container_mode: false

dicom_root: "/projekty/Pluca/Lucjan_RCHT/v202511/DICOM"
output_dir: "/umed-projekty/DICOMRT-datasets/PlucaRCHT/output"
logs_dir: "/umed-projekty/DICOMRT-datasets/PlucaRCHT/logs"

max_workers: null

scheduler:
  reserved_cores: 1
  parallel_courses: 4
  radiomics_threads_per_job: 8
  prioritize_short_courses: true

segmentation:
  device: "gpu"
  fast: false
  force: false
  roi_subset: null
  extra_models: []
  max_workers: 1
  force_split: true
  nr_threads_resample: 4
  nr_threads_save: 4
  num_proc_preprocessing: 1
  num_proc_export: 1

custom_models:
  enabled: false
  # root: "custom_models"
  # R8 thoracic tumor comparators are available after downloading weights:
  #   custom_models/download_weights.sh lung_tumor_totalseg_lung_nodules
  #   custom_models/download_weights.sh lung_tumor_pancancer_lung
  #   custom_models/download_weights.sh lung_tumor_medsam_boxprompt
  # models:
  #   - lung_tumor_totalseg_lung_nodules
  #   - lung_tumor_pancancer_lung
  #   - lung_tumor_medsam_boxprompt

radiomics:
  enabled: true
  sequential: false
  params_file: "rtpipeline/radiomics_params.yaml"
  skip_rois:
    - body
    - couchsurface
    - couchinterior
    - couchexterior
    - bones
    - m1
    - m2
  max_voxels: 1500000000
  min_voxels: 64

# FULL NTCV Perturbation Chain — thorax structures (same as immunodozymetria)
radiomics_robustness:
  enabled: true
  modes:
    - segmentation_perturbation
  segmentation_perturbation:
    intensity: "standard"
    apply_to_structures:
      - "lung_upper_lobe_left"
      - "lung_lower_lobe_left"
      - "lung_upper_lobe_right"
      - "lung_middle_lobe_right"
      - "lung_lower_lobe_right"
      - "heart"
      - "esophagus"
      - "spinal_cord"
      - "trachea"
      - "aorta"
    small_volume_changes: [-0.15, 0.0, 0.15]
    max_translation_mm: 4.0
    n_random_contour_realizations: 2
    noise_levels: [0.0, 10.0, 20.0]
  metrics:
    icc:
      implementation: "pingouin"
      icc_type: "ICC3"
      ci: true
    cov:
      enabled: true
    qcd:
      enabled: true
  thresholds:
    icc:
      robust: 0.90
      acceptable: 0.75
    cov:
      robust_pct: 10.0
      acceptable_pct: 20.0

ct_cropping:
  enabled: true
  region: "thorax"
  superior_margin_cm: 2.0
  inferior_margin_cm: 2.0
  use_cropped_for_dvh: false
  use_cropped_for_radiomics: false
  keep_original: true

environments:
  main: "rtpipeline"
  radiomics: "rtpipeline-radiomics"

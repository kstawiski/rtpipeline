name: Docker Build and Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install source-quality tools
        run: python -m pip install --disable-pip-version-check build ruff bandit pip-audit cffconvert

      - name: Validate source and launchers
        run: |
          python scripts/check_public_boundary.py
          ruff check .
          bandit -q -r rtpipeline -lll
          shellcheck -S warning build.sh run_rtpipeline.sh setup_new_project.sh scripts/install_local.sh scripts/run_local.sh
          bash -n build.sh run_rtpipeline.sh setup_new_project.sh scripts/install_local.sh scripts/run_local.sh
          bash scripts/install_local.sh --plan --device cpu
          python -m pip_audit .
          cffconvert --validate --infile CITATION.cff

      - name: Build and inspect distributions
        run: |
          python -m build
          python - <<'PY'
          from pathlib import Path
          from tarfile import open as open_tar
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("rtpipeline-*.whl"))
          with ZipFile(wheel) as archive:
              names = set(archive.namelist())
          required = {
              "rtpipeline/segmenters/__init__.py",
              "rtpipeline/eval/__init__.py",
              "rtpipeline/radiomics_params.yaml",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"wheel is missing runtime files: {missing}")
          if not any(name.endswith(".dist-info/licenses/LICENSE") for name in names):
              raise SystemExit("wheel is missing the MIT license")
          print(f"verified {wheel}")

          sdist = next(Path("dist").glob("rtpipeline-*.tar.gz"))
          with open_tar(sdist, "r:gz") as archive:
              archived = set(archive.getnames())
          roots = {name.split("/", 1)[0] for name in archived if "/" in name}
          if len(roots) != 1:
              raise SystemExit(f"sdist has an unexpected root layout: {sorted(roots)}")
          root = roots.pop()
          required_source = {
              "CITATION.cff",
              "Dockerfile",
              "Snakefile",
              "config.yaml",
              "docker_test.py",
              "docs/case_studies/index.md",
              "envs/rtpipeline-local.yaml",
              "run_rtpipeline.sh",
              "scripts/install_local.sh",
              "scripts/run_local.sh",
              "setup_docker_project.sh",
              "tests/test_release_integrity.py",
              "third_party/wheels/pyradiomics-3.0.1-cp310-cp310-linux_x86_64.whl",
              "totalseg_weights/.gitkeep",
              "webui/job_manager.py",
              "webui/templates/index.html",
          }
          missing_source = sorted(
              relative for relative in required_source
              if f"{root}/{relative}" not in archived
          )
          if missing_source:
              raise SystemExit(f"sdist is missing release/test inputs: {missing_source}")
          print(f"verified {sdist}")
          PY

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: rtpipeline:test
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Test image (full suite and container smoke)
        run: |
          docker run --rm rtpipeline:test \
            python -c 'import pathlib, pyarrow, rtpipeline, sys; assert pathlib.Path(sys.executable).as_posix().startswith("/opt/conda/envs/rtpipeline/"); assert rtpipeline.__version__ == "2.2.3"'
          docker run --rm rtpipeline:test \
            /opt/conda/envs/rtpipeline/bin/python -m pytest -q
          docker run --rm rtpipeline:test python docker_test.py

      - name: Test Snakemake dry-run
        run: |
          docker run --rm rtpipeline:test \
            snakemake --cores 1 -n --configfile /app/config.container.yaml

  local-installer-plan:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v3
        with:
          init-shell: none
          post-cleanup: all
      - name: Validate local installer detection
        run: |
          bash -n scripts/install_local.sh scripts/run_local.sh
          bash scripts/install_local.sh --plan --device cpu
          bash scripts/install_local.sh --help
          bash scripts/run_local.sh --help
      - name: Solve local environments
        run: |
          micromamba create --dry-run --yes --name rtpipeline-solve \
            --file envs/rtpipeline-local.yaml
          micromamba create --dry-run --yes --name rtpipeline-radiomics-solve \
            --file envs/rtpipeline-radiomics-local.yaml
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            micromamba create --dry-run --yes --name rtpipeline-torch-solve \
              --file envs/rtpipeline-local.yaml --channel pytorch --channel conda-forge \
              'pytorch=2.3.*' 'torchvision=0.18.*' 'torchaudio=2.3.*'
          else
            micromamba create --dry-run --yes --name rtpipeline-torch-solve \
              --file envs/rtpipeline-local.yaml --channel pytorch --channel conda-forge \
              'pytorch=2.3.*' 'torchvision=0.18.*' 'torchaudio=2.3.*' cpuonly
          fi

  push:
    needs: [build, local-installer-plan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost
          df -h /

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kstawiski/rtpipeline
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
